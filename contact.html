        <section id="contact">
            <h2>파트너십 상담 신청</h2>
            <p>새로운 파트너십 기회를 탐색할 준비가 되셨나요? 아래 양식을 작성해 주시면, 저희 팀이 48시간 이내에 연락드려 성장을 위한 구체적인 방안을 논의하겠습니다.</p>
            <div class="form-container">
                <form action="https://formspree.io/f/xdalwovl" method="POST">
                    <label for="name">이름:</label>
                    <input type="text" id="name" name="name" required placeholder="홍길동">

                    <label for="email">이메일 주소:</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">

                    <label for="message">문의 내용:</label>
                    <textarea id="message" name="message" required placeholder="귀하의 비즈니스 상황과 찾고 계신 협업 유형에 대해 알려주세요..."></textarea>

                    <button type="submit">문의 보내기</button>
                </form>
            </div>
        </section>
